    <script>
        const lightbox = GLightbox({ loop: true });
        const allGalleries = document.querySelectorAll('#gallery-02-07-2026'); // Adjusted to select the specific gallery container

        function showSelectedGallery() {
            const select = document.getElementById('archive-select');
            const selectedValue = select.value;

            // Hide all archive galleries first
            allGalleries.forEach(gallery => {
                if (!gallery.classList.contains('hidden-gallery')) {
                    gallery.classList.add('hidden-gallery');
                }
            });

            // If a valid gallery is selected, show it
            if (selectedValue) {
                const galleryToShow = document.getElementById(selectedValue);
                if (galleryToShow) {
                    galleryToShow.classList.remove('hidden-gallery');
                }
            }
        }
    </script>
